<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة الطالب - فصل الربيع 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2c2a63; --ink2:#413e86; --accent:#5b57c9;
    --line:#d7d8e6; --soft:#eef0f7; --black:#151522;
    --bg1:#eef1fb; --bg2:#e5e9f8; --ok:#0a7d3c; --fail:#d12;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Cairo','Tahoma','Segoe UI',sans-serif;color:#1b1b26;
       background:radial-gradient(1200px 600px at 50% -10%,#fbfcff 0%,var(--bg1) 45%,var(--bg2) 100%);
       min-height:100%;padding:16px 12px 40px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .sheet{max-width:660px;margin:0 auto;background:#fff;border-radius:22px;
         box-shadow:0 18px 50px rgba(30,28,80,.14);padding:18px 18px 26px;border:1px solid #eceef6;}

  /* ===== shared header ===== */
  .uni{display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--soft);padding:6px 4px 16px;}
  .uni img{width:70px;height:70px;object-fit:cover;border-radius:50%;flex:0 0 auto;
           box-shadow:0 3px 8px rgba(0,0,0,.15);}
  .uni .titles{flex:1;text-align:center;line-height:1.5;}
  .uni .titles h1{color:var(--ink);font-size:21px;font-weight:900;letter-spacing:.2px;}
  .uni .titles h2{color:var(--ink2);font-size:16px;font-weight:700;margin-top:2px;}

  /* ===== main / search view (modern) ===== */
  .hero{text-align:center;margin-top:22px;}
  .hero .badge{display:inline-block;background:linear-gradient(135deg,var(--ink),var(--accent));
       color:#fff;font-weight:800;font-size:15px;padding:9px 22px;border-radius:999px;
       box-shadow:0 8px 20px rgba(64,62,134,.28);}
  .hero p{color:#6b6b86;margin-top:14px;font-size:14.5px;font-weight:600;}
  .form{margin:22px auto 0;max-width:420px;}
  .field{position:relative;}
  .field label{display:block;text-align:right;color:var(--ink);font-weight:700;font-size:14px;margin:0 4px 8px;}
  .field input{width:100%;padding:16px 18px;font-size:19px;font-family:inherit;font-weight:700;
       border:2px solid var(--line);border-radius:16px;text-align:center;letter-spacing:2px;
       background:#fbfbfe;outline:none;transition:.18s;color:var(--ink);}
  .field input::placeholder{color:#b9bad0;font-weight:600;letter-spacing:1px;}
  .field input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(91,87,201,.15);}
  .btn-main{width:100%;margin-top:16px;padding:16px;font-size:19px;font-weight:800;font-family:inherit;
       color:#fff;background:linear-gradient(135deg,var(--ink),var(--accent));border:none;border-radius:16px;
       cursor:pointer;box-shadow:0 10px 24px rgba(64,62,134,.30);transition:.18s;}
  .btn-main:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(64,62,134,.38);}
  .btn-main:active{transform:translateY(0);}
  .hint{text-align:center;color:#9a9ab2;font-size:12.5px;margin-top:14px;font-weight:600;}
  #msg{max-width:420px;margin:0 auto;}
  .msg{margin:20px auto 0;padding:22px;border-radius:16px;text-align:center;font-size:19px;font-weight:800;}
  .msg.block{background:#fff5ec;color:#c85a00;border:2px solid #f3b078;}
  .msg.block .big{font-size:25px;display:block;margin-bottom:8px;}
  .msg.notfound{background:#fdeeee;color:#c0271f;border:2px solid #ee9a9a;}

  /* ===== result view (template look, polished) ===== */
  .pill{display:block;width:max-content;max-width:94%;margin:18px auto 0;background:#fff;
        border:1px solid var(--line);border-radius:26px;padding:11px 34px;text-align:center;
        color:var(--ink);font-weight:800;font-size:18px;box-shadow:0 4px 14px rgba(30,28,80,.08);}
  .box{margin:14px auto 0;background:#fff;border:1px solid var(--line);border-radius:16px;
       padding:13px 20px;box-shadow:0 4px 14px rgba(30,28,80,.06);text-align:center;
       color:var(--ink);font-weight:700;font-size:16px;line-height:2;}
  .box.info b{color:var(--ink);font-weight:800;}
  .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:16px auto 0;}
  .chip{display:flex;align-items:center;gap:7px;font-size:14px;color:#4a4a63;font-weight:700;}
  .chip .val{min-width:46px;text-align:center;background:#fff;border:1px solid var(--line);
             border-radius:11px;padding:7px 13px;font-weight:800;color:var(--ink);
             box-shadow:0 3px 8px rgba(30,28,80,.06);}
  .tablewrap{margin-top:18px;overflow-x:auto;border-radius:14px;border:1px solid #c7c8db;}
  table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed;}
  th,td{border:1px solid #d0d1e0;padding:11px 6px;text-align:center;overflow-wrap:break-word;}
  thead th{background:#edeef6;color:var(--ink);font-weight:800;white-space:normal;line-height:1.3;}
  td.crs{direction:ltr;font-weight:600;overflow-wrap:anywhere;}
  td .lt{direction:ltr;unicode-bidi:isolate;display:inline-block;}
  col.c-no{width:6%;} col.c-crs{width:30%;} col.c-u{width:12%;}
  col.c-deg{width:12%;} col.c-rate{width:12%;} col.c-gpa{width:13%;} col.c-note{width:15%;}
  tbody tr:nth-child(even){background:#fafbff;}
  .fail{color:var(--fail);font-weight:800;}
  .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:26px;}
  .btn-pdf{background:linear-gradient(135deg,#0a7d3c,#12a052);color:#fff;border:none;border-radius:13px;
           padding:13px 34px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;
           box-shadow:0 8px 20px rgba(10,125,60,.28);transition:.18s;}
  .btn-pdf:hover{transform:translateY(-1px);}
  .btn-exit{background:var(--black);color:#fff;border:none;border-radius:13px;padding:13px 40px;
            font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;transition:.18s;}
  .btn-exit:hover{background:#000;}

  /* ===== mobile ===== */
  @media (max-width:520px){
    .sheet{padding:14px 12px 22px;border-radius:18px;}
    .uni img{width:56px;height:56px;}
    .uni .titles h1{font-size:17px;}
    .uni .titles h2{font-size:13.5px;}
    .pill{font-size:16px;padding:10px 22px;}
    .box{font-size:14.5px;padding:11px 14px;}
    .tablewrap{overflow-x:hidden;}
    th,td{padding:8px 2px;font-size:11.5px;line-height:1.35;}
    thead th{font-size:9px;white-space:nowrap;letter-spacing:-.3px;}
    td.crs{font-size:10.5px;}
  }
  /* ===== print / PDF ===== */
  @media print{
    body{background:#fff;padding:0;}
    .sheet{box-shadow:none;border:none;max-width:100%;}
    .actions,.hint{display:none !important;}
    .tablewrap{overflow:visible;}
  }
</style>
</head>

const MAP = {};
STUDENTS.forEach(s => { MAP[(s.roll||'').toUpperCase().trim()] = s; });

function letterGPA(v){
  if(v===null||v===undefined||v==='') return ['—',null];
  const s=Number(v);
  if(s>=85) return ['A',4.0];
  if(s>=80) return ['B+',3.5];
  if(s>=75) return ['B',3.0];
  if(s>=70) return ['C+',2.5];
  if(s>=65) return ['C',2.0];
  if(s>=60) return ['D+',1.5];
  if(s>=50) return ['D',1.0];
  return ['F',0.0];
}
function arRating(a){
  if(a>=85) return 'ممتاز';
  if(a>=75) return 'جيد جدا';
  if(a>=65) return 'جيد';
  if(a>=50) return 'مقبول';
  return 'ضعيف';
}
function isFail(c){
  const se=c.second_exam?String(c.second_exam).trim():'';
  if(se==='دور ثاني') return true;
  if(se==='ناجح') return false;
  return (c.sum!==null && c.sum!==undefined && Number(c.sum)<50);
}
function n(v){ return (v===null||v===undefined||v==='')?'':v; }

async function showResult(){
  const raw=document.getElementById('roll').value.toUpperCase().trim();
  const msg=document.getElementById('msg');
  msg.innerHTML='';
  if(!raw) return;
  await refreshBlock();
  if(BLOCK.includes(raw)){
    msg.innerHTML='<div class="msg block"><span class="big">راجع قسم المالي</span>لا يمكن عرض النتيجة حالياً، يرجى مراجعة القسم المالي بالكلية.</div>';
    return;
  }
  const s=MAP[raw];
  if(!s){
    msg.innerHTML='<div class="msg notfound">لا يوجد طالب بهذا الرقم الدراسي.<br>تأكد من كتابة الرقم بشكل صحيح.</div>';
    return;
  }
  const courses=s.courses||[];
  let rows='', tu=0, wSum=0, wGpa=0;
  courses.forEach((c,i)=>{
    const u=Number(c.units)||0;
    const [lt,gp]=letterGPA(c.sum);
    const fail=isFail(c);
    if(c.sum!==null&&c.sum!==undefined&&u){ tu+=u; wSum+=Number(c.sum)*u; if(gp!==null) wGpa+=gp*u; }
    rows+='<tr>'+
      '<td>'+(i+1)+'</td>'+
      '<td class="crs">'+n(c.name_en||c.name)+'</td>'+
      '<td>'+n(c.units)+'</td>'+
      '<td>'+n(c.sum)+'</td>'+
      '<td'+(fail?' class="fail"':'')+'><span class="lt">'+lt+'</span></td>'+
      '<td><span class="lt">'+(gp===null?'':gp.toFixed(1))+'</span></td>'+
      '<td'+(fail?' class="fail"':'')+'>'+(fail?'راسب':'')+'</td>'+
    '</tr>';
  });
  const avg = tu? (wSum/tu) : 0;
  const gpa = tu? (wGpa/tu) : 0;
  const [ovLt] = letterGPA(avg);
  const ovAr = tu? arRating(avg) : '—';

  const table = courses.length ?
    '<div class="tablewrap"><table>'+
    '<colgroup><col class="c-no"><col class="c-crs"><col class="c-u"><col class="c-deg"><col class="c-rate"><col class="c-gpa"><col class="c-note"></colgroup>'+
    '<thead><tr>'+
      '<th>ر.م</th><th>المقرر</th><th>الوحدات</th><th>الدرجة</th><th>التقدير</th><th>المعامل</th><th>ملاحظات</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>'
    : '<div class="msg notfound">لا توجد نتائج مرصودة لهذا الطالب في فصل الربيع.</div>';

  // dynamic college header + logo
  var cn=document.getElementById('collegeName'); if(cn) cn.textContent=n(s.college)||'نتيجة الفصل الدراسي الربيع 2026';
  var cl=document.getElementById('collegeLogo');
  if(cl){ if(LOGOS[s.no_college]){ cl.src=collegeLogoSrc(s.no_college); cl.style.display=''; } else { cl.style.display='none'; } }
  var pillTxt = n(s.department) || '';

  document.getElementById('resultView').innerHTML =
    (pillTxt ? '<div class="pill">'+pillTxt+'</div>' : '')+
    '<div class="box">نتيجة طالب للعام الدراسي (2025-2026)<br>الفصل الدراسي الربيع</div>'+
    '<div class="box info">الاسم : <b>'+n(s.name)+'</b> &nbsp;&nbsp; الرقم الدراسي : <b>'+n(s.roll)+'</b></div>'+
    '<div class="chips">'+
      '<div class="chip"><span>المعدل</span><span class="val">'+avg.toFixed(3)+'</span></div>'+
      '<div class="chip"><span>المعامل</span><span class="val">'+gpa.toFixed(2)+'</span></div>'+
      '<div class="chip"><span>التقدير</span><span class="val">'+ovLt+'</span></div>'+
      '<div class="chip"><span class="val">'+ovAr+'</span></div>'+
    '</div>'+
    table+
    '<div class="actions">'+
      '<button class="btn-pdf" onclick="window.print()">تحميل PDF</button>'+
      '<button class="btn-exit" onclick="goBack()">خروج</button>'+
    '</div>';

  document.getElementById('searchView').style.display='none';
  document.getElementById('resultView').style.display='block';
  window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('resultView').style.display='none';
  document.getElementById('searchView').style.display='block';
  document.getElementById('roll').value='';
  document.getElementById('msg').innerHTML='';
  var cn=document.getElementById('collegeName'); if(cn) cn.textContent='نتيجة الفصل الدراسي الربيع 2026';
  var cl=document.getElementById('collegeLogo'); if(cl) cl.style.display='none';
  document.getElementById('roll').focus();
}
document.getElementById('roll').addEventListener('keydown',e=>{ if(e.key==='Enter') showResult(); });

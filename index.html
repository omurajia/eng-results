<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتيجة الطالب - فصل الربيع 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  :root{
    --primary:#4F46E5; --secondary:#6366F1; --accent:#7C3AED;
    --bg:#F8FAFC; --card:rgba(255,255,255,.75); --border:rgba(255,255,255,.55);
    --text:#111827; --muted:#6B7280;
    --grad:linear-gradient(135deg,#4F46E5 0%,#6366F1 50%,#7C3AED 100%);
    --line:rgba(79,70,229,.14); --ok:#059669; --fail:#DC2626;
    --shadow:0 20px 50px -12px rgba(79,70,229,.22);
    --shadow-sm:0 8px 24px -8px rgba(17,24,39,.14);
    --radius:26px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:'Cairo','Segoe UI',sans-serif;color:var(--text);position:relative;
       background:var(--bg);min-height:100%;padding:20px 14px 48px;overflow-x:hidden;
       -webkit-print-color-adjust:exact;print-color-adjust:exact;}
  /* ambient blurred shapes */
  body::before,body::after{content:"";position:fixed;z-index:0;border-radius:50%;
       filter:blur(90px);opacity:.5;pointer-events:none;}
  body::before{width:460px;height:460px;top:-160px;right:-120px;
       background:radial-gradient(circle,#818CF8 0%,rgba(124,58,237,0) 70%);}
  body::after{width:520px;height:520px;bottom:-200px;left:-160px;
       background:radial-gradient(circle,#A78BFA 0%,rgba(99,102,241,0) 70%);}
  .blob{position:fixed;z-index:0;border-radius:50%;filter:blur(70px);opacity:.35;pointer-events:none;
       width:300px;height:300px;top:38%;left:50%;transform:translateX(-50%);
       background:radial-gradient(circle,#C4B5FD 0%,rgba(196,181,253,0) 70%);}

  .sheet{position:relative;z-index:1;max-width:680px;margin:0 auto;
         background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
         border:1px solid var(--border);border-radius:var(--radius);
         box-shadow:var(--shadow);padding:22px 22px 30px;
         animation:fadeIn .6s ease both;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
  @keyframes glowPulse{0%,100%{box-shadow:0 10px 30px rgba(79,70,229,.35);}50%{box-shadow:0 10px 44px rgba(124,58,237,.55);}}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== header (glass card) ===== */
  .uni{display:flex;align-items:center;gap:14px;padding:16px 16px;border-radius:20px;
       background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(255,255,255,.28));
       border:1px solid var(--border);box-shadow:var(--shadow-sm);}
  .uni img{width:66px;height:66px;object-fit:cover;border-radius:50%;flex:0 0 auto;
           border:3px solid rgba(255,255,255,.85);box-shadow:0 6px 16px rgba(79,70,229,.25);}
  .uni .titles{flex:1;text-align:center;line-height:1.5;}
  .uni .titles h1{font-size:21px;font-weight:900;letter-spacing:.2px;
       background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .uni .titles h2{color:var(--muted);font-size:14.5px;font-weight:700;margin-top:3px;}

  /* ===== search view ===== */
  .hero{text-align:center;margin-top:26px;animation:slideUp .5s ease both;}
  .hero .badge{display:inline-flex;align-items:center;gap:8px;background:var(--grad);
       color:#fff;font-weight:800;font-size:15px;padding:10px 24px;border-radius:999px;
       box-shadow:0 10px 26px rgba(79,70,229,.35);}
  .hero .badge i{font-size:17px;}
  .hero h3{margin-top:20px;font-size:22px;font-weight:900;color:var(--text);}
  .hero p{color:var(--muted);margin-top:8px;font-size:14.5px;font-weight:600;}

  .form{margin:26px auto 0;max-width:440px;}
  .field{position:relative;}
  .field .fi-icon{position:absolute;top:50%;transform:translateY(-50%);right:18px;
       color:var(--primary);font-size:20px;pointer-events:none;transition:.3s;z-index:2;}
  .field input{width:100%;padding:18px 52px 18px 18px;font-size:19px;font-family:inherit;font-weight:700;
       border:1.5px solid var(--line);border-radius:18px;text-align:center;letter-spacing:2px;
       background:rgba(255,255,255,.85);outline:none;transition:.3s;color:var(--text);}
  .field input::placeholder{color:#A5AABB;font-weight:600;letter-spacing:1px;}
  .field input:focus{border-color:var(--primary);background:#fff;
       box-shadow:0 0 0 4px rgba(79,70,229,.15),0 8px 24px -8px rgba(79,70,229,.3);}
  .field input:focus + .fi-icon{color:var(--accent);transform:translateY(-50%) scale(1.12);}

  .btn-main{width:100%;margin-top:18px;padding:17px;font-size:19px;font-weight:800;font-family:inherit;
       color:#fff;background:var(--grad);background-size:180% 180%;border:none;border-radius:18px;
       cursor:pointer;box-shadow:0 12px 28px rgba(79,70,229,.35);transition:.3s;
       display:flex;align-items:center;justify-content:center;gap:10px;}
  .btn-main i{font-size:20px;}
  .btn-main:hover{transform:translateY(-2px);background-position:100% 0;
       box-shadow:0 18px 36px rgba(124,58,237,.45);}
  .btn-main:active{transform:translateY(0);}
  .btn-main.loading{pointer-events:none;animation:glowPulse 1.2s ease infinite;}
  .btn-main.loading .lbl{opacity:.75;}
  .btn-main .spin{display:none;width:19px;height:19px;border:2.5px solid rgba(255,255,255,.4);
       border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  .btn-main.loading .spin{display:inline-block;}
  .btn-main.loading i.bx{display:none;}

  .hint{text-align:center;color:var(--muted);font-size:12.5px;margin-top:16px;font-weight:600;
       display:flex;align-items:center;justify-content:center;gap:6px;}
  #msg{max-width:440px;margin:0 auto;}
  .msg{margin:22px auto 0;padding:24px;border-radius:20px;text-align:center;font-size:18px;font-weight:800;
       animation:scaleIn .35s ease both;border:1px solid;}
  .msg i{font-size:34px;display:block;margin-bottom:10px;}
  .msg.block{background:rgba(251,146,60,.12);color:#C2410C;border-color:rgba(251,146,60,.4);}
  .msg.block .big{font-size:23px;display:block;margin-bottom:6px;}
  .msg.notfound{background:rgba(220,38,38,.09);color:#B91C1C;border-color:rgba(220,38,38,.35);}

  /* ===== result view ===== */
  #resultView{animation:slideUp .45s ease both;}
  .pill{display:flex;align-items:center;justify-content:center;gap:8px;width:max-content;max-width:94%;
        margin:20px auto 0;background:rgba(255,255,255,.7);border:1px solid var(--border);
        border-radius:999px;padding:11px 28px;text-align:center;color:var(--primary);
        font-weight:800;font-size:17px;box-shadow:var(--shadow-sm);}
  .pill i{font-size:18px;}
  .subtitle{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px auto 0;
        color:var(--muted);font-weight:700;font-size:14.5px;text-align:center;}

  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 0;}
  .info-card{background:rgba(255,255,255,.72);border:1px solid var(--border);border-radius:18px;
        padding:14px 16px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;
        transition:.3s;animation:scaleIn .4s ease both;}
  .info-card:hover{transform:translateY(-3px);box-shadow:0 16px 34px -12px rgba(79,70,229,.3);}
  .info-card .ic{width:42px;height:42px;flex:0 0 auto;border-radius:13px;display:flex;
        align-items:center;justify-content:center;font-size:20px;color:#fff;background:var(--grad);
        box-shadow:0 6px 14px rgba(79,70,229,.3);}
  .info-card .tx{text-align:right;min-width:0;}
  .info-card .tx .lb{color:var(--muted);font-size:12px;font-weight:700;}
  .info-card .tx .vl{color:var(--text);font-size:16px;font-weight:800;
        overflow-wrap:anywhere;line-height:1.35;}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0 0;}
  .stat{position:relative;overflow:hidden;border-radius:20px;padding:18px 12px;text-align:center;
        color:#fff;box-shadow:0 12px 28px -10px rgba(79,70,229,.5);transition:.3s;
        animation:scaleIn .45s ease both;}
  .stat:hover{transform:translateY(-4px) scale(1.02);}
  .stat.s1{background:linear-gradient(135deg,#4F46E5,#6366F1);}
  .stat.s2{background:linear-gradient(135deg,#6366F1,#7C3AED);}
  .stat.s3{background:linear-gradient(135deg,#7C3AED,#A855F7);}
  .stat i{font-size:24px;opacity:.9;}
  .stat .num{font-size:27px;font-weight:900;margin-top:4px;line-height:1;
        direction:ltr;unicode-bidi:isolate;}
  .stat .lab{font-size:12.5px;font-weight:700;opacity:.92;margin-top:6px;}
  .stat .sub{font-size:11px;font-weight:600;opacity:.8;margin-top:2px;}

  .tablewrap{margin-top:20px;overflow-x:auto;border-radius:20px;border:1px solid var(--border);
        background:rgba(255,255,255,.6);box-shadow:var(--shadow-sm);}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:14px;table-layout:fixed;}
  th,td{padding:12px 6px;text-align:center;overflow-wrap:break-word;
        border-bottom:1px solid rgba(79,70,229,.1);}
  thead th{position:sticky;top:0;background:var(--grad);color:#fff;font-weight:800;
        white-space:normal;line-height:1.3;z-index:1;}
  td.crs{direction:ltr;font-weight:700;overflow-wrap:anywhere;color:var(--text);}
  td .lt{direction:ltr;unicode-bidi:isolate;display:inline-block;font-weight:800;}
  col.c-no{width:6%;} col.c-crs{width:30%;} col.c-u{width:12%;}
  col.c-deg{width:12%;} col.c-rate{width:12%;} col.c-gpa{width:13%;} col.c-note{width:15%;}
  tbody tr{transition:.2s;}
  tbody tr:nth-child(even){background:rgba(79,70,229,.045);}
  tbody tr:hover{background:rgba(99,102,241,.11);}
  tbody tr:last-child td{border-bottom:none;}
  .fail{color:var(--fail);font-weight:800;}

  .credit{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;
        font-size:13.5px;font-weight:800;letter-spacing:.2px;
        background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .credit i{font-size:14px;color:var(--accent);-webkit-text-fill-color:var(--accent);}
  .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px;}
  .actions button{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:15px;
        padding:14px 26px;font-size:15.5px;font-weight:800;font-family:inherit;cursor:pointer;
        color:#fff;transition:.3s;box-shadow:0 10px 24px -8px rgba(17,24,39,.35);}
  .actions button i{font-size:18px;}
  .actions button:hover{transform:translateY(-2px);}
  .btn-pdf{background:linear-gradient(135deg,#059669,#10B981);}
  .btn-exit{background:linear-gradient(135deg,#374151,#111827);}

  /* ===== mobile ===== */
  @media (max-width:520px){
    body{padding:14px 10px 30px;}
    .sheet{padding:16px 13px 24px;border-radius:22px;}
    .uni{padding:12px 12px;gap:10px;}
    .uni img{width:54px;height:54px;}
    .uni .titles h1{font-size:16.5px;}
    .uni .titles h2{font-size:12.5px;}
    .hero h3{font-size:19px;}
    .info-grid{gap:9px;}
    .info-card{padding:12px 12px;gap:10px;}
    .info-card .ic{width:38px;height:38px;font-size:18px;}
    .info-card .tx .vl{font-size:14.5px;}
    .stats{gap:8px;}
    .stat{padding:14px 6px;}
    .stat .num{font-size:22px;}
    .stat .lab{font-size:11px;}
    .pill{font-size:15px;padding:10px 20px;}
    .tablewrap{overflow-x:hidden;}
    th,td{padding:9px 2px;font-size:11.5px;line-height:1.35;}
    thead th{font-size:9.5px;white-space:nowrap;letter-spacing:-.3px;}
    td.crs{font-size:10.5px;}
    .actions button{padding:12px 20px;font-size:14px;}
  }
  /* ===== print / PDF ===== */
  @media print{
    body{background:#fff;padding:0;}
    body::before,body::after,.blob{display:none;}
    .sheet{box-shadow:none;border:none;max-width:100%;background:#fff;backdrop-filter:none;}
    .actions,.hint{display:none !important;}
    .tablewrap{overflow:visible;}
    thead th{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>

const MAP = {};
STUDENTS.forEach(s => { MAP[(s.roll||'').toUpperCase().trim()] = s; });

function letterGPA(v){
  if(v===null||v===undefined||v==='') return ['—',null];
  const s=Number(v);
  if(s>=85) return ['A',4.0];
  if(s>=80) return ['B+',3.5];
  if(s>=75) return ['B',3.0];
  if(s>=70) return ['C+',2.5];
  if(s>=65) return ['C',2.0];
  if(s>=60) return ['D+',1.5];
  if(s>=50) return ['D',1.0];
  return ['F',0.0];
}
function arRating(a){
  if(a>=85) return 'ممتاز';
  if(a>=75) return 'جيد جدا';
  if(a>=65) return 'جيد';
  if(a>=50) return 'مقبول';
  return 'ضعيف';
}
function isFail(c){
  const se=c.second_exam?String(c.second_exam).trim():'';
  if(se==='دور ثاني') return true;
  if(se==='ناجح') return false;
  return (c.sum!==null && c.sum!==undefined && Number(c.sum)<50);
}
function n(v){ return (v===null||v===undefined||v==='')?'':v; }

async function showResult(){
  const raw=document.getElementById('roll').value.toUpperCase().trim();
  const msg=document.getElementById('msg');
  const btn=document.querySelector('.btn-main');
  msg.innerHTML='';
  if(!raw) return;
  if(btn) btn.classList.add('loading');
  await refreshBlock();
  if(BLOCK.includes(raw)){
    if(btn) btn.classList.remove('loading');
    msg.innerHTML='<div class="msg block"><i class="bi bi-exclamation-octagon-fill"></i><span class="big">راجع قسم المالي</span>لا يمكن عرض النتيجة حالياً، يرجى مراجعة القسم المالي بالكلية.</div>';
    return;
  }
  const s=MAP[raw];
  if(!s){
    if(btn) btn.classList.remove('loading');
    msg.innerHTML='<div class="msg notfound"><i class="bi bi-search"></i>لا يوجد طالب بهذا الرقم الدراسي.<br>تأكد من كتابة الرقم بشكل صحيح.</div>';
    return;
  }
  if(btn) btn.classList.remove('loading');
  const courses=s.courses||[];
  let rows='', tu=0, wSum=0, wGpa=0;
  courses.forEach((c,i)=>{
    const u=Number(c.units)||0;
    const [lt,gp]=letterGPA(c.sum);
    const fail=isFail(c);
    if(c.sum!==null&&c.sum!==undefined&&u){ tu+=u; wSum+=Number(c.sum)*u; if(gp!==null) wGpa+=gp*u; }
    rows+='<tr>'+
      '<td>'+(i+1)+'</td>'+
      '<td class="crs">'+n(c.name_en||c.name)+'</td>'+
      '<td>'+n(c.units)+'</td>'+
      '<td>'+n(c.sum)+'</td>'+
      '<td'+(fail?' class="fail"':'')+'><span class="lt">'+lt+'</span></td>'+
      '<td><span class="lt">'+(gp===null?'':gp.toFixed(1))+'</span></td>'+
      '<td'+(fail?' class="fail"':'')+'>'+(fail?'راسب':'')+'</td>'+
    '</tr>';
  });
  const avg = tu? (wSum/tu) : 0;
  const gpa = tu? (wGpa/tu) : 0;
  const [ovLt] = letterGPA(avg);
  const ovAr = tu? arRating(avg) : '—';

  const table = courses.length ?
    '<div class="tablewrap"><table>'+
    '<colgroup><col class="c-no"><col class="c-crs"><col class="c-u"><col class="c-deg"><col class="c-rate"><col class="c-gpa"><col class="c-note"></colgroup>'+
    '<thead><tr>'+
      '<th>ر.م</th><th>المقرر</th><th>الوحدات</th><th>الدرجة</th><th>التقدير</th><th>المعامل</th><th>ملاحظات</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>'
    : '<div class="msg notfound"><i class="bi bi-inbox"></i>لا توجد نتائج مرصودة لهذا الطالب في فصل الربيع.</div>';

  // dynamic college header + logo
  var cn=document.getElementById('collegeName'); if(cn) cn.textContent=n(s.college)||'نتيجة الفصل الدراسي الربيع 2026';
  var cl=document.getElementById('collegeLogo');
  if(cl){ if(LOGOS[s.no_college]){ cl.src=collegeLogoSrc(s.no_college); cl.style.display=''; } else { cl.style.display='none'; } }
  var pillTxt = n(s.department) || '';

  var infoCard = function(icon,lb,vl){
    return '<div class="info-card"><div class="ic"><i class="bi '+icon+'"></i></div>'+
           '<div class="tx"><div class="lb">'+lb+'</div><div class="vl">'+vl+'</div></div></div>';
  };

  document.getElementById('resultView').innerHTML =
    (pillTxt ? '<div class="pill"><i class="bi bi-mortarboard-fill"></i>'+pillTxt+'</div>' : '')+
    '<div class="subtitle"><i class="bi bi-calendar-event"></i> نتيجة العام الدراسي 2025-2026 — الفصل الدراسي الربيع</div>'+
    '<div class="info-grid">'+
      infoCard('bi-person-fill','اسم الطالب', n(s.name))+
      infoCard('bi-hash','الرقم الدراسي', '<span style="direction:ltr;unicode-bidi:isolate;display:inline-block;">'+n(s.roll)+'</span>')+
    '</div>'+
    '<div class="stats">'+
      '<div class="stat s1"><i class="bi bi-graph-up-arrow"></i><div class="num">'+avg.toFixed(3)+'</div><div class="lab">المعدل</div></div>'+
      '<div class="stat s2"><i class="bi bi-star-fill"></i><div class="num">'+gpa.toFixed(2)+'</div><div class="lab">المعامل (GPA)</div></div>'+
      '<div class="stat s3"><i class="bi bi-award-fill"></i><div class="num">'+ovLt+'</div><div class="lab">التقدير</div><div class="sub">'+ovAr+'</div></div>'+
    '</div>'+
    table+
    '<div class="credit"><i class="bi bi-pen-fill"></i> تصميم م. عُمر مراجع</div>'+
    '<div class="actions">'+
      '<button class="btn-pdf" onclick="window.print()"><i class="bi bi-download"></i> تحميل PDF</button>'+
      '<button class="btn-exit" onclick="goBack()"><i class="bi bi-box-arrow-right"></i> خروج</button>'+
    '</div>';

  document.getElementById('searchView').style.display='none';
  document.getElementById('resultView').style.display='block';
  window.scrollTo(0,0);
}
function goBack(){
  document.getElementById('resultView').style.display='none';
  document.getElementById('searchView').style.display='block';
  document.getElementById('roll').value='';
  document.getElementById('msg').innerHTML='';
  var cn=document.getElementById('collegeName'); if(cn) cn.textContent='نتيجة الفصل الدراسي الربيع 2026';
  var cl=document.getElementById('collegeLogo'); if(cl) cl.style.display='none';
  document.getElementById('roll').focus();
}
document.getElementById('roll').addEventListener('keydown',e=>{ if(e.key==='Enter') showResult(); });

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة الحجب - قسم المالية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Cairo',Tahoma,sans-serif;background:#eef2f7;color:#1e293b;padding:16px;}
  .wrap{max-width:760px;margin:0 auto;background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.08);}
  h1{font-size:20px;margin:0 0 4px;color:#0f2c4d;}
  .sub{color:#64748b;font-size:13px;margin-bottom:16px;}
  .tok{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px;margin-bottom:16px;}
  .tok label{display:block;font-weight:700;font-size:13px;margin-bottom:6px;}
  .tok input{width:100%;padding:10px;border:1.5px solid #cbd5e1;border-radius:9px;font-family:inherit;font-size:13px;direction:ltr;}
  .row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  button{font-family:inherit;font-weight:700;border:none;border-radius:9px;padding:9px 16px;cursor:pointer;font-size:14px;}
  .b-save{background:#0f2c4d;color:#fff;}
  .b-un{background:#16a34a;color:#fff;}
  .b-bl{background:#dc2626;color:#fff;}
  .b-ghost{background:#e2e8f0;color:#334155;}
  .add{display:flex;gap:8px;margin:14px 0;}
  .add input{flex:1;padding:10px;border:1.5px solid #cbd5e1;border-radius:9px;font-family:inherit;direction:ltr;text-align:right;}
  table{width:100%;border-collapse:collapse;margin-top:8px;}
  th,td{padding:10px 8px;text-align:right;border-bottom:1px solid #eef2f7;font-size:14px;}
  th{color:#64748b;font-size:12px;font-weight:700;}
  .roll{direction:ltr;unicode-bidi:isolate;font-weight:700;}
  .empty{color:#94a3b8;text-align:center;padding:20px;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f2c4d;color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;opacity:0;transition:.3s;pointer-events:none;max-width:90%;text-align:center;}
  #toast.show{opacity:1;}
  .count{background:#fef2f2;color:#dc2626;border-radius:20px;padding:2px 12px;font-size:13px;font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <h1>لوحة إدارة الحجب</h1>
  <div class="sub">قسم المالية — كلية الهندسة. فك الحجب عن الطالب يظهر نتيجته له خلال دقيقة تقريباً.</div>

  <div id="panel">
    <div class="add">
      <input id="addRoll" placeholder="اكتب رقم الطالب لحجبه (مثال 25E010)">
      <button class="b-bl" onclick="doBlock()">حجب</button>
    </div>
    <div style="margin:6px 0 4px;font-weight:800;">الطلاب المحجوبون <span class="count" id="cnt">0</span></div>
    <table><thead><tr><th>الرقم الدراسي</th><th>الاسم</th><th></th></tr></thead>
    <tbody id="list"><tr><td colspan="3" class="empty">جارٍ التحميل…</td></tr></tbody></table>
  </div>
</div>
<div id="toast"></div>

<script>
const BLOB='https://jsonblob.com/api/jsonBlob/019f89a7-76af-7beb-8636-ea580a16bdf4';
const NAMES={"25E001": "عبدالرحمن سبع فؤاد دامي", "25E009": "حمد صالح حمد عبدالله", "25E010": "خميس محمد خميس", "25E011": "صالح عارف صالح بركه", "25E007": "جمال سعيد ميكائيل احميده", "25E008": "عبدالله صالح سعيد", "25E013": "اياد احمد عثمان مختار", "25E003": "عبدالمجيد عبدالله السنوسي عبدالحق", "25E012": "اياد علي عبدالله بوبكر", "25E002": "عبدالسلام سليمان ادريس خطاب", "25E004": "محمد حافظ محمد خطاب", "25E005": "عبدالباسط اشرف عبدالحميد حسن", "25E014": "مفتاح فرحات مفتاح درمان", "25E017": "ادريس عبدالناصر ادريس خزيم", "25E006": "احمد ادم موسى كريم", "25E015": "محمد خميس محمد عبدالونيس", "25E019": "عبدالرحمن عادل حمد المهدوي", "25E020": "عبدالرحمن محمود فرج جاب الله", "25E021": "عبدالله صالح عيسى عبدالله", "25E022": "وسام سعيد مكائيل أحميدة", "25E023": "عبدالرحمن ابراهيم اسماعيل وحيدة", "25E024": "عقوب حميد عاقوب الصائم", "25E025": "خالد اشرف عبدالرحيم ثابت", "25E026": "عبدالناصر سعيد عبدالله الطائع", "25E027": "احمد عبدالسلام احمد صالح", "25E028": "المنذر سامي علي محمد", "25E029": "اجويلي انور خميس محمد", "25E030": "السنوسي ابراهيم السنوسي بشير", "25E031": "انس خالد سعد رويفه", "25E032": "عبدالله صالح سالم عبدربه", "25E033": "جمعه محمد جمعه ابراهيم", "25E036": "رزق معاون رزق محمد", "25E037": "صالح جمعة مصطفى عبدربة", "25E038": "بوغرارة جمعه مصطفى عبدربه", "25E039": "موسى منصور عبدالغني شعيب", "25E040": "عبدالله مختار مفتاح خطاب", "25E041": "محمد جمال عبدالناصر سليمان", "25E042": "طارق عزالدين رزق عياد", "25E043": "اسامه ضيف سالم عبدالله", "25E044": "فارس عاطف ابراهيم ناجي", "25E045": "الجيلاني عبدالكريم عوض ابراهيم", "25E046": "بغداد عبدالكريم عوض عيسى", "25E047": "محمد حسين محمد الزروق", "25E048": "مصطفى احمد عبدالحميد يونس", "25E050": "سالم اشرف سالم حسن", "25E049": "ابراهيم رمضان نوري خليل", "25E051": "عبدالله علي سالم عبدالحميد", "25E034": "فوز عبدالوهاب طاهر عثمان", "25E056": "الناجي مرضي ناجي عبدالستار", "25E057": "محمد انيس عبدالغني محمد", "25E053": "محمد عبدالسلام اسماعيل بوشوق", "25E055": "عبدالرحمن مراجع علي قاسم", "25E054": "المهدي عبدالسلام عبدالنبي المهدي", "26E058": "محمد نصر عبدالله حمد", "26E059": "رمضان محمد رمضان الصفراني", "26E060": "ابراهيم محمود ادريس عبدالسلام", "26E061": "القاسم جمعة قاسم حسين", "26E062": "خليل جمعه محمد خليل", "26E063": "سراج عبدالكريم موسي  عبدالجليل", "26E064": "ايوب عبد الناصر رمضان بشير", "26E065": "ياسر خيرالله الجالي سليمان", "26E066": "زكريا ادريس محمد اهويدي"};
let list=["25E007", "25E008", "25E009", "25E013", "25E014", "25E023", "25E025", "25E026", "25E029", "25E031", "25E032", "25E037", "25E038", "25E047", "25E049", "25E051", "25E057", "25E059", "25E065"], busy=false;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

async function load(){
  try{
    const r=await fetch(BLOB+'?t='+Date.now(),{cache:'no-store',headers:{'Accept':'application/json'}});
    if(r.ok){const j=await r.json();if(Array.isArray(j))list=j.map(x=>String(x).toUpperCase().trim());}
  }catch(e){toast('تعذر التحميل — تحقق من الاتصال');}
  render();
}
async function save(newList,ok){
  if(busy)return;busy=true;
  try{
    const r=await fetch(BLOB,{method:'PUT',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(newList)});
    if(r.ok){list=newList.map(x=>x.toUpperCase().trim());render();toast(ok);}
    else toast('فشل الحفظ ('+r.status+')');
  }catch(e){toast('فشل الاتصال');}
  busy=false;
}
function unblock(roll){if(confirm('فك الحجب عن '+roll+'؟'))save(list.filter(x=>x!==roll),'تم فك الحجب — يظهر للطالب خلال ثوانٍ');}
function doBlock(){var v=document.getElementById('addRoll').value.toUpperCase().trim();if(!v)return;if(list.includes(v)){toast('محجوب مسبقاً');return;}save(list.concat([v]),'تم الحجب');document.getElementById('addRoll').value='';}

function render(){
  var tb=document.getElementById('list');document.getElementById('cnt').textContent=list.length;
  if(!list.length){tb.innerHTML='<tr><td colspan="3" class="empty">لا يوجد طلاب محجوبون</td></tr>';return;}
  tb.innerHTML=list.slice().sort().map(function(r){
    return '<tr><td class="roll">'+r+'</td><td>'+(NAMES[r]||'—')+'</td>'+
      '<td><button class="b-un" onclick="unblock(\''+r+'\')">فك الحجب</button></td></tr>';
  }).join('');
}
document.getElementById('addRoll').addEventListener('keydown',e=>{if(e.key==='Enter')doBlock();});
load();
</script>
</body>
</html>
